<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Weather Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f7f6;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: auto;
        }
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Weather Checker</h1>
        <p>Enter the temperature to see the climate status:</p>
        
        <input type="number" id="tempInput" placeholder="Enter temperature in °C">
        <br>
        <button onclick="checkWeather()">Check Weather</button>

        <div id="result"></div>
    </div>

    <script>
        function checkWeather() {
            // 1. Get the value from the input box
            var temperature = document.getElementById("tempInput").value;
            var resultDiv = document.getElementById("result");

            // 2. Check if the user forgot to enter a number
            if (temperature === "") {
                resultDiv.innerHTML = "Please enter a temperature!";
                resultDiv.style.color = "red";
                return;
            }

            // 3. Convert input to a number
            temperature = Number(temperature);

            // 4. Logic: If it is hot, show summary/sunny. If it is cool, show rainy.
            if (temperature >= 30) {
                resultDiv.innerHTML = "☀️ Climate Status: Sunny & Summer Mood!";
                resultDiv.style.color = "#ff9800"; // Orange color
            } else if (temperature < 30 && temperature >= 15) {
                resultDiv.innerHTML = "🌤️ Climate Status: Pleasant & Clear!";
                resultDiv.style.color = "#4caf50"; // Green color
            } else {
                resultDiv.innerHTML = "🌧️ Climate Status: Cool & Rainy Weather!";
                resultDiv.style.color = "#2196f3"; // Blue color
            }
        }
    </script>

</body>
</html>
